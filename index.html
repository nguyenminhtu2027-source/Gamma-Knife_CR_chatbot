// 🧠 ENGINE THÔNG MINH
// =======================
function reply(input){

    let q = normalize(input);

    // 🚨 kiểm tra nguy hiểm
    for (let d of danger){
        if(q.includes(d)){
            return "⚠️ Dấu hiệu nguy hiểm! Hãy đến bệnh viện ngay.";
        }
    }

    let best = null;
    let maxScore = 0;

    for (let item of faq){

        let score = 0;

        for (let kw of item.q){

            if(q.includes(kw)) score += 3;

            let words = kw.split(" ");
            for (let w of words){
                if(q.includes(w)) score++;
            }
        }

        if(score > maxScore){
            maxScore = score;
            best = item;
        }
    }

    if(best && maxScore > 0){
        return best.a;
    }

    return "Bạn có thể hỏi:\n• Quy trình\n• Chuẩn bị\n• Sau điều trị\n• Biến chứng\n\n⚠️ Thông tin chỉ mang tính tham khảo.";
}


// =======================
// UI
// =======================
function add(text, cls){
    let div = document.createElement("div");
    div.className = "msg " + cls;
    div.innerText = text;
    document.getElementById("messages").appendChild(div);
    document.getElementById("messages").scrollTop = 9999;
}

function typing(on=true){
    document.getElementById("typing").innerText = on ? "Đang trả lời..." : "";
}

function send(){
    let q = document.getElementById("input").value;
    if(!q) return;

    add(q,"user");
    document.getElementById("input").value="";

    typing(true);

    setTimeout(()=>{
        typing(false);
        add(reply(q) + "\n\n📞 Nếu có dấu hiệu bất thường, hãy đến bệnh viện.","bot");
    },500);
}

function quickAsk(q){
    document.getElementById("input").value = q;
    send();
}

function resetChat(){
    document.getElementById("messages").innerHTML="";
}

document.getElementById("input").addEventListener("keypress",function(e){
    if(e.key==="Enter") send();
});

</script>
